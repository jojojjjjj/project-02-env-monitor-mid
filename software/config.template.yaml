# config.yaml — 温湿度网络时钟 配置模板
# WiFi Temp/Humidity Network Clock — Configuration Template
#
# 复刻学生请修改下面 WiFi 账号密码, 然后把对应值填进
# software/src/env_clock/Core/Inc/wifi_config.h (那个才是固件真正读取的配置)。
# 本 yaml 仅供人阅读/对照, 固件不读取它。
#
# 复刻自 Bilibili 视频 BV1tb4y1U7Du (UP主: 乐在程上)。

# === WiFi 配置 (必改) ===
# ESP8266 仅支持 2.4GHz WiFi, 请确认路由器开了 2.4GHz 频段。
wifi:
  ssid: "YOUR_SSID"          # WiFi 名称
  password: "YOUR_PASSWORD"  # WiFi 密码

# === NTP 网络授时 ===
ntp:
  server: "ntp.aliyun.com"   # NTP 服务器 (阿里云, 国内快)
  timezone_offset: 8         # 时区 (小时), 中国北京时间 = UTC+8

# === 刷新周期 ===
refresh:
  sensor_ms: 600000          # 温湿度刷新间隔 (毫秒) — 10 分钟
  sntp_resync_ms: 3600000    # SNTP 重新对时间隔 (毫秒) — 1 小时

# === 串口 ===
uart:
  esp8266_baud: 115200       # ESP8266 AT 固件波特率 (老固件可能是 9600)
  debug_baud: 115200         # STM32 调试串口 (USART1) 波特率

# === 引脚映射 (Pin Map) — STM32L433 KE1 板 ===
# 对照 hardware/wiring-guide.md 接线
pins:
  # ESP8266 (ESP-01S) — USART3
  esp8266_tx: "PB10"   # STM32 TX → ESP8266 RX
  esp8266_rx: "PB11"   # STM32 RX ← ESP8266 TX
  # SHT31 温湿度 — 硬件 I2C2
  sht31_scl: "PB13"
  sht31_sda: "PB14"
  sht31_addr: 0x44     # SHT31 I2C 地址 (7 位)
  # SSD1306 OLED — 软件 I2C
  oled_scl: "PB8"
  oled_sda: "PB9"
  # 无源蜂鸣器 — TIM2_CH2 PWM
  buzzer: "PA1"
  # 按键 (手动重新对时) — 输入上拉, 按下接地
  button: "PA0"
  # 调试串口 — USART1
  debug_tx: "PA9"
  debug_rx: "PA10"
